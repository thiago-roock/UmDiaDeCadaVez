<body id="corpo">
<div id="capture" class="app">
<header class="topbar">

  </div>
  <div id="toggleModoEscuro" class="right">

</header>

<main class="container">

  <section class="hero">

    <h1 class="big" id="MaisUmDia"></h1>
    <h2 class="medium" id="MenosUmDia"></h2>

    <div class="hint">
      <em>Viu?</em>
      <span class="arrow">↓</span>
    </div>

    <h2 class="title">Um dia de cada vez</h2>

    <p class="subtitle">
      até completar os <b id="totalDias"></b> dias de <span id="ano"></span> 🙂
    </p>

  </section>

  <section class="progress">
    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>
    <span id="progress-text"></span>
  </section>

<button class="share-inline" onclick="compartilhar()">
